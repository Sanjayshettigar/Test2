<h2>Employees with Salary > ₹50,000</h2>
<table border="1">
    <tr><th>Name</th><th>Email</th><th>Phone</th><th>Hiring Date</th><th>Job Title</th><th>Salary</th></tr>
    {% for e in employees %}
    <tr>
        <td>{{ e.name }}</td>
        <td>{{ e.email }}</td>
        <td>{{ e.phone }}</td>
        <td>{{ e.date_of_hiring }}</td>
        <td>{{ e.job_title }}</td>
        <td>₹{{ e.salary }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="6">No employees found</td></tr>
    {% endfor %}
</table>
<a href="{% url 'add_employee' %}">Add New Employee</a>
