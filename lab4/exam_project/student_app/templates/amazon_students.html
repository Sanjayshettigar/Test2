<h2>Students Placed in Amazon</h2>
<table border="1">
    <tr><th>USN</th><th>Name</th><th>Company</th></tr>
    {% for s in students %}
    <tr>
        <td>{{ s.usn }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.company_name }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No Amazon placements</td></tr>
    {% endfor %}
</table>
<a href="{% url 'add_student' %}">Add Student</a>
