<h2>CSE Professors</h2>
<table border="1">
    <tr><th>ID</th><th>Title</th><th>Name</th><th>Branch</th></tr>
    {% for f in faculty %}
    <tr>
        <td>{{ f.faculty_id }}</td>
        <td>{{ f.title }}</td>
        <td>{{ f.name }}</td>
        <td>{{ f.branch }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No CSE Professors found</td></tr>
    {% endfor %}
</table>
<a href="{% url 'add_faculty' %}">Add Faculty</a>
