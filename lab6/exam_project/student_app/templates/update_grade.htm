<h2>Update Grade by Name</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update</button>
</form>
<p><b>{{ message }}</b></p>

<h3>Updated Student List</h3>
<table border="1">
    <tr><th>Name</th><th>USN</th><th>Department</th><th>Grade</th></tr>
    {% for s in students %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.usn }}</td>
        <td>{{ s.department }}</td>
        <td>{{ s.grade }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No records</td></tr>
    {% endfor %}
</table>
<br><a href="{% url 'add_student' %}">Add New Student</a>
