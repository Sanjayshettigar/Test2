<h2>All Students</h2>
<table border="1">
    <tr><th>Name</th><th>USN</th><th>Semester</th><th>Fee Paid</th></tr>
    {% for s in students %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.usn }}</td>
        <td>{{ s.semester }}</td>
        <td>{{ s.fee_paid|yesno:"Yes,No" }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No records found.</td></tr>
    {% endfor %}
</table>
<a href="{% url 'add_student' %}">Add Student</a> | 
<a href="{% url 'delete_unpaid' %}">Delete Unpaid</a>
